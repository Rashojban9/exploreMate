# ExploreMate - Render Deployment (Simplified for Free Tier)
# Deploys API Gateway as a single web service

services:
  - type: web
    name: exploremate
    env: docker
    region: oregon
    dockerContext: .
    dockerFilePath: Dockerfile
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
    autoDeploy: true
