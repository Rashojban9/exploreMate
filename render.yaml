services:
  # Service Discovery (Eureka)
  - type: pvt
    name: exploremate-service-discovery
    env: docker
    region: oregon
    dockerContext: service-discovery/service-discovery
    dockerFilePath: Dockerfile
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
    autoDeploy: true

  # Auth Service
  - type: pvt
    name: exploremate-auth-service
    env: docker
    region: oregon
    dockerContext: auth-service/auth-service
    dockerFilePath: Dockerfile
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
    autoDeploy: true

  # Trip Service
  - type: pvt
    name: exploremate-trip-service
    env: docker
    region: oregon
    dockerContext: trip-service/trip-service
    dockerFilePath: Dockerfile
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: MONGODB_URI
        sync: false
    autoDeploy: true

  # Email Service
  - type: pvt
    name: exploremate-email-service
    env: docker
    region: oregon
    dockerContext: email-service/email-service
    dockerFilePath: Dockerfile
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: EMAIL_USERNAME
        sync: false
      - key: EMAIL_PASSWORD
        sync: false
    autoDeploy: true

  # API Gateway (Public Entry Point)
  - type: web
    name: exploremate-api-gateway
    env: docker
    region: oregon
    dockerContext: api-gateway/api-gateway
    dockerFilePath: Dockerfile
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: AUTH_SERVICE_URL
        value: http://exploremate-auth-service:8080
      - key: TRIP_SERVICE_URL
        value: http://exploremate-trip-service:8083
      - key: EMAIL_SERVICE_URL
        value: http://exploremate-email-service:9090
      - key: AI_SERVICE_URL
        value: http://exploremate-ai-service:9091
    autoDeploy: true

  # AI Service
  - type: pvt
    name: exploremate-ai-service
    env: docker
    region: oregon
    dockerContext: ai-service/ai-service
    dockerFilePath: Dockerfile
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: EUREKA_SERVER_URL
        value: http://exploremate-service-discovery:8761/eureka
    autoDeploy: true
