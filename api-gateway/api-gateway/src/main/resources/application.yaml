spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600
      routes:
            # Auth routes - handles frontend /api/auth/** calls
            - id: auth_api_route
              uri: ${AUTH_SERVICE_URL:http://localhost:8080}
              predicates:
                - Path=/api/auth/**
              filters:
                - StripPrefix=1
            # Trip routes - handles frontend /api/trips/** calls
            - id: trip_api_route
              uri: ${TRIP_SERVICE_URL:http://localhost:8083}
              predicates:
                - Path=/api/trips/**
              filters:
                - StripPrefix=1
            # Saved items routes
            - id: saved_api_route
              uri: ${TRIP_SERVICE_URL:http://localhost:8083}
              predicates:
                - Path=/api/saved/**
              filters:
                - StripPrefix=1
            # AI routes - handles frontend /api/ai/** calls
            - id: ai_api_route
              uri: ${AI_SERVICE_URL:http://localhost:9091}
              predicates:
                - Path=/api/ai/**
              filters:
                - StripPrefix=1
            # Group Trip routes - handles frontend /api/group-trips/** calls
            - id: group_trip_api_route
              uri: ${GROUP_TRIP_SERVICE_URL:http://localhost:8084}
              predicates:
                - Path=/api/group-trips/**
              filters:
                - StripPrefix=1
            # QR Guide routes - handles frontend /api/qr-guides/** calls
            - id: qr_guide_api_route
              uri: ${QR_GUIDE_SERVICE_URL:http://localhost:8085}
              predicates:
                - Path=/api/qr-guides/**
              filters:
                - StripPrefix=1
            - id: notification_api_route
              uri: lb://notification-service
              predicates:
                - Path=/api/notifications/**
            # Notification WebSocket route
            - id: notification_ws_route
              uri: lb:ws://notification-service
              predicates:
                - Path=/ws/notifications/**
            # Legacy routes for service-to-service communication
            - id: auth_public_route
              uri: ${AUTH_SERVICE_URL:http://localhost:8080}
              predicates:
                - Path=/public/**
              filters:
                - PrefixPath=/api
            - id: auth_route
              uri: ${AUTH_SERVICE_URL:http://localhost:8080}
              predicates:
                - Path=/auth-service/**
              filters:
                - StripPrefix=1
                - PrefixPath=/api
            - id: trip_route
              uri: ${TRIP_SERVICE_URL:http://localhost:8083}
              predicates:
                - Path=/trip-service/**
              filters:
                - StripPrefix=1
            - id: email_route
              uri: ${EMAIL_SERVICE_URL:http://localhost:9090}
              predicates:
                - Path=/email-service/**
              filters:
                - StripPrefix=1
            - id: group_trip_route
              uri: ${GROUP_TRIP_SERVICE_URL:http://localhost:8084}
              predicates:
                - Path=/group-trip-service/**
              filters:
                - StripPrefix=1
            - id: qr_guide_route
              uri: ${QR_GUIDE_SERVICE_URL:http://localhost:8085}
              predicates:
                - Path=/qr-guide-service/**
              filters:
                - StripPrefix=1
            - id: test_route
              uri: ${AUTH_SERVICE_URL:http://localhost:8080}
              predicates:
                - Path=/test
              filters:
                - PrefixPath=/api

server:
  port: 9080
eureka:
  client:
    service-url:
      defaultZone: http://service-discovery:8761/eureka/
  instance:
    prefer-ip-address: true

jwt:
  secret: ${JWT_SECRET:my_super_secret_key_that_is_very_long_1234567890}
