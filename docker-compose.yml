# ExploreMate - Railway Deployment
# Railway has better free tier - supports docker-compose deployment

services:
  # Kafka and Zookeeper
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    dns: 8.8.8.8
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    dns: 8.8.8.8
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    depends_on:
      - zookeeper

  # Service Discovery (Eureka)
  service-discovery:
    build: ./service-discovery/service-discovery
    dns: 8.8.8.8
    ports:
      - "8761:8761"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    deploy:
      resources:
        limits:
          memory: 512M

  # Auth Service
  auth-service:
    build: ./auth-service/auth-service
    dns: 8.8.8.8
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - MONGODB_URI=${MONGODB_URI_AUTH}
      - JWT_SECRET=${JWT_SECRET}
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - FRONTEND_URL=${FRONTEND_URL}
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-discovery:8761/eureka/
    env_file:
      - .env
    depends_on:
      - service-discovery
      - kafka
    deploy:
      resources:
        limits:
          memory: 512M

  # Trip Service
  trip-service:
    build: ./trip-service/trip-service
    dns: 8.8.8.8
    ports:
      - "8083:8083"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - MONGODB_URI=${MONGODB_URI_TRIP}
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-discovery:8761/eureka/
    env_file:
      - .env
    depends_on:
      - service-discovery
    deploy:
      resources:
        limits:
          memory: 512M

  # Email Service
  email-service:
    build: ./email-service/email-service
    dns: 8.8.8.8
    ports:
      - "9090:9090"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_MAIL_USERNAME=${EMAIL_USERNAME}
      - SPRING_MAIL_PASSWORD=${EMAIL_PASSWORD}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-discovery:8761/eureka/
    env_file:
      - .env
    depends_on:
      - service-discovery
      - kafka
    deploy:
      resources:
        limits:
          memory: 512M

  # API Gateway
  api-gateway:
    build: ./api-gateway/api-gateway
    dns: 8.8.8.8
    ports:
      - "9080:9080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - AUTH_SERVICE_URL=http://auth-service:8080
      - TRIP_SERVICE_URL=http://trip-service:8083
      - EMAIL_SERVICE_URL=http://email-service:9090
      - AI_SERVICE_URL=http://ai-service:9091
      - GROUP_TRIP_SERVICE_URL=http://group-trip-service:8084
      - QR_GUIDE_SERVICE_URL=http://qr-guide-service:8085
      - NOTIFICATION_SERVICE_URL=http://notification-service:8086
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-discovery:8761/eureka/
      - JWT_SECRET=${JWT_SECRET}
    env_file:
      - .env
    depends_on:
      - service-discovery
      - auth-service
      - trip-service
      - group-trip-service
      - qr-guide-service
      - notification-service
    deploy:
      resources:
        limits:
          memory: 512M

  # AI Service (Groq API - fast, free GPU)
  ai-service:
    build: ./ai-service/ai-service
    dns: 8.8.8.8
    env_file:
      - .env
    ports:
      - "9091:9091"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - MONGODB_URI=${MONGODB_URI_AI}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_MODEL=${GROQ_MODEL}
      - AUTH_SERVICE_URL=http://auth-service:8080
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-discovery:8761/eureka/
    depends_on:
      - service-discovery
    deploy:
      resources:
        limits:
          memory: 512M

  # Group Trip Service
  group-trip-service:
    build: ./group-trip-service
    dns: 8.8.8.8
    ports:
      - "8084:8084"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - MONGODB_URI=${MONGODB_URI_GROUP_TRIP}
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-discovery:8761/eureka/
    env_file:
      - .env
    depends_on:
      - service-discovery
    deploy:
      resources:
        limits:
          memory: 512M

  # QR Guide Service
  qr-guide-service:
    build: ./qr-guide-service
    dns: 8.8.8.8
    ports:
      - "8085:8085"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - MONGODB_URI=${MONGODB_URI_QR_GUIDE}
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-discovery:8761/eureka/
    env_file:
      - .env
    depends_on:
      - service-discovery
    deploy:
      resources:
        limits:
          memory: 512M

  # Notification Service
  notification-service:
    build: ./notification-service
    dns: 8.8.8.8
    env_file:
      - .env
    ports:
      - "8086:8086"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-discovery:8761/eureka/
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      - service-discovery
      - kafka
    deploy:
      resources:
        limits:
          memory: 512M
