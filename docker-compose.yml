# ExploreMate - Railway Deployment
# Railway has better free tier - supports docker-compose deployment

services:
  # Service Discovery (Eureka)
  service-discovery:
    build: ./service-discovery/service-discovery
    ports:
      - "8761:8761"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    deploy:
      resources:
        limits:
          memory: 512M

  # Auth Service
  auth-service:
    build: ./auth-service/auth-service
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - MONGODB_URI=${MONGODB_URI}
      - JWT_SECRET=${JWT_SECRET}
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-discovery:8761/eureka/
    depends_on:
      - service-discovery
    deploy:
      resources:
        limits:
          memory: 512M

  # Trip Service
  trip-service:
    build: ./trip-service/trip-service
    ports:
      - "8083:8083"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - MONGODB_URI=${MONGODB_URI}
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-discovery:8761/eureka/
    depends_on:
      - service-discovery
    deploy:
      resources:
        limits:
          memory: 512M

  # Email Service
  email-service:
    build: ./email-service/email-service
    ports:
      - "9090:9090"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_MAIL_USERNAME=${EMAIL_USERNAME}
      - SPRING_MAIL_PASSWORD=${EMAIL_PASSWORD}
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-discovery:8761/eureka/
    depends_on:
      - service-discovery
    deploy:
      resources:
        limits:
          memory: 512M

  # API Gateway
  api-gateway:
    build: ./api-gateway/api-gateway
    ports:
      - "9080:9080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - AUTH_SERVICE_URL=http://auth-service:8080
      - TRIP_SERVICE_URL=http://trip-service:8083
      - EMAIL_SERVICE_URL=http://email-service:9090
      - AI_SERVICE_URL=http://ai-service:9091
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-discovery:8761/eureka/
    depends_on:
      - service-discovery
      - auth-service
      - trip-service
    deploy:
      resources:
        limits:
          memory: 512M

  # AI Service
  ai-service:
    build: ./ai-service/ai-service
    ports:
      - "9091:9091"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-discovery:8761/eureka/
    depends_on:
      - service-discovery
    deploy:
      resources:
        limits:
          memory: 512M
